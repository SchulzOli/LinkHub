name: Bug report
description: Report a defect, regression, or broken behavior
title: "[Bug]: "
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      description: Please confirm the basics first.
      options:
        - label: I searched existing issues
          required: true
        - label: I can reproduce the problem reliably
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happens now?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps as clearly as possible.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who or what is affected?
      placeholder: Example: blocks link creation, breaks editing, only affects mobile, etc.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include any relevant environment details.
      value: |
        - OS:
        - Browser:
        - App mode: dev / build / deployed
      render: markdown
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, recordings, logs, or extra context if helpful.
      placeholder: Paste logs, add notes, or drag screenshots here.
    validations:
      required: false
